<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="warehouse-bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d3d3d3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a9a9a9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#warehouse-bg)"/>
  <!-- Shelving racks -->
  <g id="rack1">
    <rect x="50" y="80" width="100" height="350" fill="#666"/>
    <rect x="60" y="120" width="80" height="30" fill="#888"/>
    <rect x="60" y="180" width="80" height="30" fill="#888"/>
    <rect x="60" y="240" width="80" height="30" fill="#888"/>
    <rect x="60" y="300" width="80" height="30" fill="#888"/>
    <rect x="60" y="360" width="80" height="30" fill="#888"/>
  </g>
  <use href="#rack1" x="150"/>
  <use href="#rack1" x="300"/>
  <use href="#rack1" x="450"/>
  <!-- Equipment boxes (HVAC parts) -->
  <rect x="65" y="130" width="25" height="20" fill="#0b2545"/>
  <rect x="100" y="135" width="25" height="20" fill="#1b6ca8"/>
  <rect x="80" y="190" width="25" height="20" fill="#f4a300"/>
  <rect x="105" y="245" width="25" height="20" fill="#0b2545"/>
  <rect x="70" y="305" width="25" height="20" fill="#1b6ca8"/>
  <!-- Lighting -->
  <circle cx="200" cy="30" r="20" fill="#ffff99" opacity="0.6"/>
  <circle cx="550" cy="30" r="20" fill="#ffff99" opacity="0.6"/>
  <!-- Placeholder text -->
  <text x="400" y="480" text-anchor="middle" font-family="Arial" font-size="14" fill="#555">Drop your warehouse or equipment photo here</text>
</svg>
