name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch / PR.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      # Placeholder values so the portal build can instantiate the Prisma
      # client and the auth layer without a real database. No connection is
      # made during the build; these are never used at runtime.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci?schema=public"
      AUTH_SECRET: "ci-placeholder-secret-not-for-production-use"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build dealer portal
        run: npm run build:portal

      - name: Build marketing site
        run: npm run build:marketing
